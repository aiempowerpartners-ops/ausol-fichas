<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ausol Blog Agent</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:#0b1220; color:#e7eefc; margin:0; padding:24px;}
    .wrap{max-width:980px; margin:0 auto;}
    h1{margin:0 0 6px 0; font-size:28px;}
    .sub{margin:0 0 18px 0; color:#a9b6d3;}
    .card{background:#121b2f; border:1px solid #213057; border-radius:12px; padding:16px; margin:14px 0;}
    label{display:block; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:#9fb0d8; margin:10px 0 6px;}
    input, select, textarea{width:100%; box-sizing:border-box; background:#0c1428; border:1px solid #24345f; color:#e7eefc; border-radius:10px; padding:10px; font-size:14px; outline:none;}
    textarea{min-height:110px; resize:vertical;}
    .row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
    .btn{background:#2f6bff; border:none; color:white; padding:12px 14px; border-radius:10px; font-weight:700; cursor:pointer; width:100%;}
    .btn:disabled{opacity:.6; cursor:not-allowed;}
    .msg{margin-top:10px; padding:10px 12px; border-radius:10px; display:none;}
    .ok{display:block; background:rgba(30,200,120,.12); border:1px solid rgba(30,200,120,.30); color:#8ff3c6;}
    .err{display:block; background:rgba(255,80,80,.12); border:1px solid rgba(255,80,80,.30); color:#ffb0b0;}
    .info{display:block; background:rgba(47,107,255,.12); border:1px solid rgba(47,107,255,.30); color:#b9ccff;}
    .out{white-space:pre-wrap; background:#0c1428; border:1px solid #24345f; border-radius:10px; padding:12px; line-height:1.55;}
    .small{font-size:12px; color:#9fb0d8;}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Ausol Blog Agent</h1>
    <p class="sub">Generador semanal de artículos (SEO + GEO) para Citroën/Peugeot/Leapmotor y contenidos de taller.</p>

    <div class="card">
      <div class="row">
        <div>
          <label>Marca / Web destino</label>
          <select id="site">
            <option value="grupoausol">Grupo Ausol</option>
            <option value="citroen">Citroën Ausol</option>
            <option value="peugeot">Peugeot Ausol</option>
          </select>
          <p class="small">Publicaréis el mismo contenido en estas 3 webs.</p>
        </div>
        <div>
          <label>Idioma</label>
          <select id="lang">
            <option value="es">Español</option>
            <option value="en">English</option>
            <option value="both">Ambos</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div>
          <label>Modo semanal</label>
          <select id="mode">
            <option value="periodista">Semana 1: Novedades / Periodista</option>
            <option value="vecino">Semana 2: Práctico local / Vecino</option>
            <option value="analista">Semana 3: Comparativa / Analista (tabla)</option>
            <option value="taller">Semana 4: Postventa / Jefe de taller</option>
          </select>
        </div>
        <div>
          <label>Tema</label>
          <input id="topic" placeholder="Ej: Leapmotor T03 en Málaga: autonomía real, carga y dudas típicas" />
        </div>
      </div>

      <label>Notas opcionales (ofertas, modelos concretos, enfoque local, etc.)</label>
      <textarea id="notes" placeholder="Ej: mencionar A-7, calor en verano, aparcar en centro, taller Ausol, respaldo Stellantis, etc."></textarea>

      <button class="btn" id="btn">Generar artículo</button>
      <div id="msg" class="msg"></div>
    </div>

    <div class="card">
      <label>Salida</label>
      <div id="out" class="out">Aquí aparecerá el artículo en Markdown cuando conectemos el backend.</div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    function show(type, text){
      const m = $('msg');
      m.className = 'msg ' + type;
      m.textContent = text;
      m.style.display = 'block';
    }

    $('btn').addEventListener('click', async () => {
      const payload = {
        site: $('site').value,
        lang: $('lang').value,
        mode: $('mode').value,
        topic: $('topic').value.trim(),
        notes: $('notes').value.trim()
      };
      if(!payload.topic){
        show('err','Escribe un tema.');
        return;
      }
      $('btn').disabled = true;
      show('info','Generando… (cuando conectemos backend, aquí llamará a /api/blog/generate)');
      try{
        const r = await fetch('/api/blog/generate', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(payload)
        });
        const d = await r.json();
        if(!d.success) throw new Error(d.error || 'Error');
        $('out').textContent = d.markdown;
        show('ok','Artículo generado. Puedes copiar/pegar en el CMS.');
      }catch(e){
        show('err','Aún no está conectado el backend o hay error: ' + e.message);
      }
      $('btn').disabled = false;
    });
  </script>
</body>
</html>
